<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OP Tasks">
<meta name="theme-color" content="#0D1B2A">
<title>OP Tasks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--gold:#C9A228;--bg:#0D1B2A;--card:#112233;--border:#1e3a5f;--text:#e6edf3;--muted:#6a8aa8;--radius:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

/* HEADER */
.header{background:linear-gradient(180deg,#0a1520,var(--bg));padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:480px;margin:0 auto}
.header h1{font-size:18px;font-weight:900;letter-spacing:-.3px}
.header h1 span{color:var(--gold)}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer}
.clear-btn:active{background:var(--border)}

/* ADD TASK */
.add-bar{padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:calc(env(safe-area-inset-top) + 56px);z-index:99}
.add-bar-inner{display:flex;gap:8px;max-width:480px;margin:0 auto}
.add-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px;font-size:14px;outline:none}
.add-input::placeholder{color:var(--muted)}
.add-cat{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 8px;font-size:13px;outline:none;cursor:pointer}
.add-submit{background:var(--gold);border:none;color:#0D1B2A;border-radius:10px;padding:10px 14px;font-size:16px;font-weight:800;cursor:pointer;min-width:42px}
.add-submit:active{opacity:.8}

/* CONTENT */
.content{max-width:480px;margin:0 auto;padding:16px 18px 100px}

/* SECTION */
.section{margin-bottom:20px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer;user-select:none}
.section-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.section-count{font-size:10px;background:var(--border);color:var(--muted);border-radius:20px;padding:2px 7px;font-weight:700}
.section-arrow{font-size:12px;color:var(--muted);margin-left:auto;transition:transform .2s}
.section-arrow.collapsed{transform:rotate(-90deg)}
.section-tasks{display:flex;flex-direction:column;gap:6px}
.section-tasks.hidden{display:none}

/* TASK CARD */
.task{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.task:active{transform:scale(.98)}
.task.done{opacity:.45}
.task.done .task-text{text-decoration:line-through;color:var(--muted)}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s}
.task.done .task-check{background:var(--gold);border-color:var(--gold);color:#0D1B2A;font-size:13px}
.task-body{flex:1;min-width:0}
.task-text{font-size:14px;line-height:1.45;color:var(--text)}
.task-meta{font-size:11px;color:var(--muted);margin-top:3px}
.task-del{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#3a5a7a;font-size:18px;padding:4px;cursor:pointer;opacity:0;transition:opacity .2s}
.task:hover .task-del{opacity:1}

/* DONE SECTION */
.done-toggle{width:100%;background:none;border:1px dashed var(--border);color:var(--muted);border-radius:10px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px}
.done-toggle:active{background:var(--border)}

/* EMPTY */
.empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px}

/* SWIPE HINT */
.hint{font-size:10px;color:#2a4a6a;text-align:center;padding:8px;margin-bottom:8px}

/* PROGRESS BAR */
.progress-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),#e8c060);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>OP <span>Tasks</span></h1>
      <div class="header-sub" id="progress-text">Loading…</div>
    </div>
    <button class="clear-btn" onclick="clearDone()">Clear Done</button>
  </div>
</div>

<div class="add-bar">
  <div class="add-bar-inner">
    <input class="add-input" id="new-task-input" type="text" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()">
    <select class="add-cat" id="new-task-cat">
      <option value="deep">🔵</option>
      <option value="admin">🟡</option>
      <option value="multi">🟠</option>
      <option value="meet">🟢</option>
      <option value="coach">⚫</option>
      <option value="personal">⚪</option>
    </select>
    <button class="add-submit" onclick="addTask()">+</button>
  </div>
</div>

<div class="content">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  <div id="task-list"></div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────
const SECTIONS = [
  { id:'meet',    emoji:'🟢', label:'Meetings',         color:'#4af08a' },
  { id:'deep',    emoji:'🔵', label:'Deep Thinking',    color:'#4a8af0' },
  { id:'admin',   emoji:'🟡', label:'Deep Admin',       color:'#f0c84a' },
  { id:'multi',   emoji:'🟠', label:'Multitask Admin',  color:'#f0874a' },
  { id:'coach',   emoji:'⚫', label:'Coaching',         color:'#888' },
  { id:'personal',emoji:'⚪', label:'Personal / Errands',color:'#aaa' },
  { id:'recurr',  emoji:'🔁', label:'Recurring',        color:'#7a6aa8' },
];

const DEFAULT_TASKS = [
  // Meetings
  { id:'t1',  cat:'meet',    text:'Call with Ang — Apr 20 @ 8:00 AM — Odyssey gym membership inquiry', done:false },
  { id:'t2',  cat:'meet',    text:'Gabby (Ariz.) — THIS WEEK ONLY: Mon night training (Apr 20, 5–8 PM) + Private moved to Tuesday Apr 21', done:false },

  // Deep Thinking
  { id:'t3',  cat:'deep',    text:"Coach's Blueprint — Weekly dedicated deep work block (recurring)", done:false },
  { id:'t4',  cat:'deep',    text:'OP Blueprint — Deep Thinking block #1 (this week)', done:false },
  { id:'t5',  cat:'deep',    text:'OP Blueprint — Deep Thinking block #2 (this week)', done:false },
  { id:'t6',  cat:'deep',    text:'Develop NotebookLM programming template system (Tri-City, Volleyball Program)', done:false },

  // Deep Admin
  { id:'t7',  cat:'admin',   text:'Follow up with Peyton (Univ. of Montana Western) — volleyball program programming', done:false },
  { id:'t8',  cat:'admin',   text:'Review & confirm ads are fully live — OVERDUE (was due Apr 19)', done:false },

  // Multitask Admin
  { id:'t9',  cat:'multi',   text:'Finish uploading the Summer Warrior Program', done:false },
  { id:'t10', cat:'multi',   text:'Post Summer Warrior content + Story — due WEDNESDAY Apr 22', done:false },

  // Personal
  { id:'t11', cat:'personal',text:'Go to the grocery store', done:false },
  { id:'t12', cat:'personal',text:'Go buy more drinks from Costco', done:false },

  // Recurring
  { id:'r1',  cat:'recurr',  text:'Run payroll — 1st of every month', done:false },
  { id:'r2',  cat:'recurr',  text:'Pay building rent — 1st of every month', done:false },
  { id:'r3',  cat:'recurr',  text:'Pay home rent — 1st of every month', done:false },
  { id:'r4',  cat:'recurr',  text:'Run payroll — 15th of every month', done:false },
];

// ── STATE ────────────────────────────────────────────────────────
function loadTasks() {
  try {
    var saved = localStorage.getItem('op_tasks_v2');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_TASKS));
}
function saveTasks() {
  localStorage.setItem('op_tasks_v2', JSON.stringify(tasks));
}
function loadCollapsed() {
  try { return JSON.parse(localStorage.getItem('op_collapsed') || '{}'); } catch(e) { return {}; }
}
function saveCollapsed() {
  localStorage.setItem('op_collapsed', JSON.stringify(collapsed));
}

var tasks = loadTasks();
var collapsed = loadCollapsed();

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  var container = document.getElementById('task-list');
  var html = '';
  var total = tasks.length, done = tasks.filter(t=>t.done).length;

  SECTIONS.forEach(function(sec) {
    var secTasks = tasks.filter(t => t.cat === sec.id);
    if (secTasks.length === 0) return;
    var secDone = secTasks.filter(t=>t.done).length;
    var isCollapsed = collapsed[sec.id];
    html += '<div class="section">';
    html += '<div class="section-header" onclick="toggleSection(\'' + sec.id + '\')">';
    html += '<span style="font-size:16px">' + sec.emoji + '</span>';
    html += '<span class="section-label" style="color:' + sec.color + '">' + sec.label + '</span>';
    html += '<span class="section-count">' + secDone + '/' + secTasks.length + '</span>';
    html += '<span class="section-arrow' + (isCollapsed ? ' collapsed' : '') + '">▾</span>';
    html += '</div>';
    html += '<div class="section-tasks' + (isCollapsed ? ' hidden' : '') + '">';
    secTasks.forEach(function(t) {
      html += '<div class="task' + (t.done ? ' done' : '') + '" onclick="toggleTask(\'' + t.id + '\')">';
      html += '<div class="task-check">' + (t.done ? '✓' : '') + '</div>';
      html += '<div class="task-body"><div class="task-text">' + escHtml(t.text) + '</div></div>';
      html += '<button class="task-del" onclick="event.stopPropagation();deleteTask(\'' + t.id + '\')">×</button>';
      html += '</div>';
    });
    html += '</div></div>';
  });

  if (html === '') {
    html = '<div class="empty"><div class="empty-icon">✅</div>All clear — nothing pending.</div>';
  }

  container.innerHTML = html;

  // Progress
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' of ' + total + ' done (' + pct + '%)';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── ACTIONS ──────────────────────────────────────────────────────
function toggleTask(id) {
  var t = tasks.find(t=>t.id===id);
  if (t) { t.done = !t.done; saveTasks(); render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t=>t.id!==id);
  saveTasks(); render();
}

function toggleSection(id) {
  collapsed[id] = !collapsed[id];
  saveCollapsed(); render();
}

function clearDone() {
  if (tasks.filter(t=>t.done).length === 0) return;
  if (!confirm('Remove all completed tasks?')) return;
  tasks = tasks.filter(t=>!t.done);
  saveTasks(); render();
}

function addTask() {
  var input = document.getElementById('new-task-input');
  var cat   = document.getElementById('new-task-cat').value;
  var text  = input.value.trim();
  if (!text) return;
  var id = 'u' + Date.now();
  tasks.push({ id:id, cat:cat, text:text, done:false });
  input.value = '';
  saveTasks(); render();
  // Expand section
  if (collapsed[cat]) { collapsed[cat] = false; saveCollapsed(); render(); }
  // Scroll to bottom of that section after render
  setTimeout(function() {
    var cards = document.querySelectorAll('.task');
    if (cards.length) cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 100);
}

render();
</script>
</body>
</html>
