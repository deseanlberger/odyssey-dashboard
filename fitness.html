<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="OFit"/>
<title>Odyssey Fitness</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0d0d;
  --bg2:#1a1a1a;
  --bg3:#242424;
  --bg4:#2e2e2e;
  --border:#333;
  --text:#f0f0f0;
  --muted:#888;
  --accent:#e8c84a;
  --accent2:#c4a830;
  --green:#4caf50;
  --red:#f44336;
  --blue:#2196f3;
  --orange:#ff9800;
  --purple:#9c27b0;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:80px;}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 14px;gap:4px;background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;transition:color .2s;}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8;}

/* HEADER */
.header{padding:16px 16px 8px;background:var(--bg);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);}
.header h1{font-size:20px;font-weight:700;color:var(--accent);}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* TABS (sub-tabs) */
.tabs{display:flex;gap:4px;padding:12px 16px 0;}
.tab{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}

/* SECTION */
.section{padding:14px 16px;}
.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--muted);}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.stat-val{font-size:18px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}

/* MACROS BAR */
.macro-bar-wrap{margin-bottom:14px;}
.macro-bar{height:10px;border-radius:5px;background:var(--bg4);overflow:hidden;display:flex;margin-bottom:4px;}
.macro-seg{height:100%;transition:width .4s;}
.macro-legend{display:flex;gap:12px;}
.macro-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.macro-lbl{font-size:11px;color:var(--muted);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:active{background:var(--accent2);}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-ghost:active{background:var(--bg4);}
.btn-danger{background:#2a0a0a;color:var(--red);border:1px solid #500;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:8px;}

/* FORM */
.form-group{margin-bottom:12px;}
.form-label{font-size:12px;color:var(--muted);margin-bottom:4px;display:block;}
.form-input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;}
.form-input:focus{outline:none;border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* EXERCISE ROW */
.ex-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.ex-row:last-child{border-bottom:none;}
.ex-name{flex:1;font-size:14px;}
.ex-detail{font-size:12px;color:var(--muted);}
.set-chip{display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;color:var(--muted);margin:2px;}
.set-chip.done{background:#0a2a0a;border-color:var(--green);color:var(--green);}

/* LOG ENTRY */
.log-entry{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.log-name{font-size:14px;font-weight:600;}
.log-cals{font-size:13px;color:var(--accent);font-weight:700;}
.log-macros{display:flex;gap:10px;}
.log-macro{font-size:11px;color:var(--muted);}
.log-macro span{color:var(--text);font-weight:600;}

/* WEIGHT CHART */
.chart-wrap{width:100%;height:180px;position:relative;margin:10px 0;}
canvas{width:100%!important;}

/* STREAK */
.streak-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px 16px 40px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;}
.hidden{display:none!important;}
.flex{display:flex;} .gap8{gap:8px;} .gap12{gap:12px;} .flex-col{flex-direction:column;}
.align-center{align-items:center;} .justify-between{justify-content:space-between;} .justify-end{justify-content:flex-end;}
.mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt16{margin-top:16px;} .mb8{margin-bottom:8px;}
.w-full{width:100%;}
.color-green{color:var(--green);}
.color-red{color:var(--red);}
.color-blue{color:var(--blue);}
.color-orange{color:var(--orange);}
.color-purple{color:var(--purple);}
.pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;}
.pill-green{background:#0a2a0a;color:var(--green);}
.pill-red{background:#2a0a0a;color:var(--red);}
.pill-blue{background:#0a1a2a;color:var(--blue);}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
select.form-input option{background:var(--bg2);}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
</style>
</head>
<body>

<!-- PAGES -->
<div id="page-today" class="page"></div>
<div id="page-workouts" class="page hidden"></div>
<div id="page-nutrition" class="page hidden"></div>
<div id="page-weight" class="page hidden"></div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal-body">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('today')" id="nav-today">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Today
  </button>
  <button class="nav-btn" onclick="showPage('workouts')" id="nav-workouts">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M6 4v16M18 4v16M3 12h3M18 12h3M6 8h12M6 16h12"/></svg>
    Workouts
  </button>
  <button class="nav-btn" onclick="showPage('nutrition')" id="nav-nutrition">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 2a7 7 0 017 7c0 5-7 13-7 13S5 14 5 9a7 7 0 017-7z"/></svg>
    Nutrition
  </button>
  <button class="nav-btn" onclick="showPage('weight')" id="nav-weight">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </button>
</nav>

<script>
// ========================
// STATE
// ========================
var LS_PLANS   = 'of_plans_v1';
var LS_WLOG    = 'of_wlog_v1';
var LS_FLOG    = 'of_flog_v1';
var LS_WLOG_W  = 'of_wlog_weight_v1';
var LS_PREFS   = 'of_prefs_v1';
var LS_FOODS   = 'of_foods_v1';

function load(key, def){ try{var v=localStorage.getItem(key); return v?JSON.parse(v):def;}catch(e){return def;} }
function save(key,val){ localStorage.setItem(key,JSON.stringify(val)); }

var plans      = load(LS_PLANS, []);      // [{id,name,exercises:[{name,sets,reps,notes}]}]
var wlog       = load(LS_WLOG, []);       // [{id,date,planId,planName,exercises:[{name,sets:[{reps,weight,done}]}],notes,duration}]
var flog       = load(LS_FLOG, []);       // [{id,date,entries:[{foodId,food,cals,p,c,f,qty}]}]
var weightLog  = load(LS_WLOG_W, []);     // [{date,weight}]
var prefs      = load(LS_PREFS, {calTarget:2000,protTarget:180,carbTarget:200,fatTarget:70,weightUnit:'lbs'});
var foods      = load(LS_FOODS, [
  {id:'f1',name:'Chicken Breast (4oz)',cals:187,p:35,c:0,f:4},
  {id:'f2',name:'White Rice (1 cup cooked)',cals:206,p:4,c:45,f:0},
  {id:'f3',name:'Eggs (2 large)',cals:148,p:12,c:1,f:10},
  {id:'f4',name:'Greek Yogurt (6oz)',cals:100,p:17,c:6,f:0},
  {id:'f5',name:'Oatmeal (1 cup dry)',cals:300,p:10,c:54,f:5},
  {id:'f6',name:'Protein Shake',cals:130,p:25,c:5,f:2},
  {id:'f7',name:'Banana',cals:105,p:1,c:27,f:0},
  {id:'f8',name:'Almonds (1oz)',cals:164,p:6,c:6,f:14},
  {id:'f9',name:'Broccoli (1 cup)',cals:55,p:4,c:11,f:1},
  {id:'f10',name:'Sweet Potato (med)',cals:130,p:3,c:30,f:0},
]);

var activePage = 'today';
var activeWorkoutTab = 'log';
var activeNutritionTab = 'log';
var activeSessionId = null;  // current in-progress workout session id

function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(s){ var d=new Date(s+'T12:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function uid(){ return Date.now()+'_'+Math.random().toString(36).slice(2,7); }

// ========================
// PAGE ROUTING
// ========================
function showPage(p){
  activePage = p;
  document.querySelectorAll('.page').forEach(function(el){ el.classList.add('hidden'); });
  document.querySelectorAll('.nav-btn').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('page-'+p).classList.remove('hidden');
  document.getElementById('nav-'+p).classList.add('active');
  renderPage(p);
}

function renderPage(p){
  if(p==='today') renderToday();
  else if(p==='workouts') renderWorkouts();
  else if(p==='nutrition') renderNutrition();
  else if(p==='weight') renderWeight();
}

// ========================
// TODAY PAGE
// ========================
function renderToday(){
  var td = todayStr();
  var todayFlog = flog.find(function(f){ return f.date===td; });
  var todayWlog = wlog.filter(function(w){ return w.date===td; });
  var totalCals = 0, totalP=0, totalC=0, totalF=0;
  if(todayFlog){ todayFlog.entries.forEach(function(e){ totalCals+=e.cals*e.qty; totalP+=e.p*e.qty; totalC+=e.c*e.qty; totalF+=e.f*e.qty; }); }
  totalCals=Math.round(totalCals); totalP=Math.round(totalP); totalC=Math.round(totalC); totalF=Math.round(totalF);
  var calPct = Math.min(100, Math.round(totalCals/prefs.calTarget*100));
  var pPct = Math.min(100, Math.round(totalP/prefs.protTarget*100));
  var cPct = Math.min(100, Math.round(totalC/prefs.carbTarget*100));
  var fPct = Math.min(100, Math.round(totalF/prefs.fatTarget*100));

  // Weight streak
  var streak = 0;
  var d = new Date();
  while(true){
    var ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(weightLog.find(function(w){return w.date===ds;})) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }

  var latestWeight = weightLog.length ? weightLog[weightLog.length-1].weight : null;
  var calRemain = prefs.calTarget - totalCals;

  var html = '<div class="header"><div class="header-row"><h1>Odyssey Fitness</h1><span class="streak-badge">🔥 '+streak+' day streak</span></div><div class="header-sub">'+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})+'</div></div>';

  html += '<div class="section">';

  // Quick log weight
  html += '<div style="display:flex;gap:8px;margin-bottom:14px;">';
  html += '<button class="btn btn-primary w-full" onclick="openLogWeight()">+ Log Weight</button>';
  html += '<button class="btn btn-ghost w-full" onclick="openLogWorkout()">+ Log Workout</button>';
  html += '</div>';

  // Cals summary
  html += '<div class="stats-row">';
  html += '<div class="stat-box"><div class="stat-val">'+totalCals+'</div><div class="stat-lbl">Eaten</div></div>';
  html += '<div class="stat-box"><div class="stat-val" style="color:'+(calRemain>=0?'#4caf50':'#f44336')+'">'+Math.abs(calRemain)+'</div><div class="stat-lbl">'+(calRemain>=0?'Remaining':'Over')+'</div></div>';
  html += '<div class="stat-box"><div class="stat-val">'+totalP+'g</div><div class="stat-lbl">Protein</div></div>';
  html += '<div class="stat-box"><div class="stat-val">'+(latestWeight?latestWeight+'':'—')+'</div><div class="stat-lbl">Weight</div></div>';
  html += '</div>';

  // Macro bars
  html += '<div class="macro-bar-wrap card" style="padding:12px 14px;">';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="font-size:13px;font-weight:600;">Calories</span><span style="font-size:13px;color:var(--muted);">'+totalCals+' / '+prefs.calTarget+'</span></div>';
  html += '<div class="macro-bar"><div class="macro-seg" style="width:'+calPct+'%;background:var(--accent);"></div></div>';
  html += '<div class="macro-legend mt8">';
  html += '<span class="macro-lbl"><span class="macro-dot" style="background:var(--blue);"></span>P '+totalP+'/'+prefs.protTarget+'g</span>';
  html += '<span class="macro-lbl"><span class="macro-dot" style="background:var(--orange);"></span>C '+totalC+'/'+prefs.carbTarget+'g</span>';
  html += '<span class="macro-lbl"><span class="macro-dot" style="background:var(--red);"></span>F '+totalF+'/'+prefs.fatTarget+'g</span>';
  html += '</div>';
  html += '<div class="macro-bar mt8"><div class="macro-seg" style="width:'+pPct+'%;background:var(--blue);"></div></div>';
  html += '<div class="macro-bar mt8"><div class="macro-seg" style="width:'+cPct+'%;background:var(--orange);"></div></div>';
  html += '<div class="macro-bar mt8"><div class="macro-seg" style="width:'+fPct+'%;background:var(--red);"></div></div>';
  html += '</div>';

  // Today workouts
  if(todayWlog.length){
    html += '<div class="section-title">Today\'s Workouts</div>';
    todayWlog.forEach(function(w){
      html += '<div class="card"><div class="log-header"><span class="log-name">💪 '+escHtml(w.planName||'Workout')+'</span><span style="font-size:12px;color:var(--muted);">'+(w.duration?w.duration+' min':'')+'</span></div>';
      html += '<div style="font-size:12px;color:var(--muted);">'+w.exercises.length+' exercises</div></div>';
    });
  }

  // Target settings shortcut
  html += '<div class="mt12" style="text-align:center;"><button class="btn btn-ghost btn-sm" onclick="openSettings()">⚙ Adjust Targets</button></div>';

  html += '</div>';
  document.getElementById('page-today').innerHTML = html;
}

// ========================
// WORKOUTS PAGE
// ========================
function renderWorkouts(){
  var html = '<div class="header"><div class="header-row"><h1>Workouts</h1>';
  if(activeWorkoutTab==='log') html += '<button class="btn btn-primary btn-sm" onclick="openLogWorkout()">+ Log</button>';
  else html += '<button class="btn btn-primary btn-sm" onclick="openNewPlan()">+ Plan</button>';
  html += '</div></div>';
  html += '<div class="tabs"><button class="tab '+(activeWorkoutTab==='log'?'active':'')+'" onclick="setWTab(\'log\')">Log</button><button class="tab '+(activeWorkoutTab==='plans'?'active':'')+'" onclick="setWTab(\'plans\')">Plans</button></div>';
  html += '<div class="section">';

  if(activeWorkoutTab==='log'){
    var sorted = wlog.slice().sort(function(a,b){return b.date>a.date?1:-1;});
    if(!sorted.length){ html += '<div class="empty-state">No workouts logged yet.<br>Tap + Log to get started.</div>'; }
    sorted.forEach(function(w){
      html += '<div class="card"><div class="log-header"><span class="log-name">'+escHtml(w.planName||'Workout')+'</span><div class="flex gap8"><span style="font-size:12px;color:var(--muted);">'+fmtDate(w.date)+'</span><button class="btn btn-danger btn-sm btn-icon" onclick="deleteWlog(\''+w.id+'\')"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button></div></div>';
      html += '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">'+(w.duration?'⏱ '+w.duration+' min  ':'')+'💪 '+w.exercises.length+' exercises</div>';
      w.exercises.forEach(function(ex){
        html += '<div class="ex-row"><div><div class="ex-name">'+escHtml(ex.name)+'</div>';
        var doneSets = ex.sets.filter(function(s){return s.done;}).length;
        html += '<div class="ex-detail">'+doneSets+'/'+ex.sets.length+' sets</div></div>';
        html += '<div>';
        ex.sets.forEach(function(s){
          html += '<span class="set-chip '+(s.done?'done':'')+'">'+s.weight+'×'+s.reps+'</span>';
        });
        html += '</div></div>';
      });
      if(w.notes) html += '<div style="font-size:12px;color:var(--muted);margin-top:6px;">📝 '+escHtml(w.notes)+'</div>';
      html += '</div>';
    });
  } else {
    if(!plans.length){ html += '<div class="empty-state">No workout plans yet.<br>Tap + Plan to build one.</div>'; }
    plans.forEach(function(p){
      html += '<div class="card"><div class="log-header"><span class="card-title">'+escHtml(p.name)+'</span>';
      html += '<div class="flex gap8"><button class="btn btn-ghost btn-sm" onclick="openEditPlan(\''+p.id+'\')">Edit</button><button class="btn btn-primary btn-sm" onclick="startFromPlan(\''+p.id+'\')">▶ Start</button></div></div>';
      html += '<div class="card-sub">'+p.exercises.length+' exercises</div>';
      html += '<div class="mt8">';
      p.exercises.forEach(function(ex){ html += '<div class="ex-row"><span class="ex-name">'+escHtml(ex.name)+'</span><span class="ex-detail">'+ex.sets+'×'+ex.reps+(ex.notes?' — '+ex.notes:'')+'</span></div>'; });
      html += '</div></div>';
    });
  }

  html += '</div>';
  document.getElementById('page-workouts').innerHTML = html;
}
function setWTab(t){ activeWorkoutTab=t; renderWorkouts(); }
function deleteWlog(id){ if(!confirm('Delete this workout log?')) return; wlog=wlog.filter(function(w){return w.id!==id;}); save(LS_WLOG,wlog); renderWorkouts(); }

// ========================
// NUTRITION PAGE
// ========================
function renderNutrition(){
  var html = '<div class="header"><div class="header-row"><h1>Nutrition</h1>';
  if(activeNutritionTab==='log') html += '<button class="btn btn-primary btn-sm" onclick="openAddFood()">+ Food</button>';
  else html += '<button class="btn btn-primary btn-sm" onclick="openAddCustomFood()">+ Food</button>';
  html += '</div></div>';
  html += '<div class="tabs"><button class="tab '+(activeNutritionTab==='log'?'active':'')+'" onclick="setNTab(\'log\')">Today</button><button class="tab '+(activeNutritionTab==='history'?'active':'')+'" onclick="setNTab(\'history\')">History</button><button class="tab '+(activeNutritionTab==='foods'?'active':'')+'" onclick="setNTab(\'foods\')">My Foods</button></div>';
  html += '<div class="section">';

  var td = todayStr();

  if(activeNutritionTab==='log'){
    var todayFlog = flog.find(function(f){ return f.date===td; });
    var totalCals=0,totalP=0,totalC=0,totalF=0;
    if(todayFlog){ todayFlog.entries.forEach(function(e){ totalCals+=e.cals*e.qty; totalP+=e.p*e.qty; totalC+=e.c*e.qty; totalF+=e.f*e.qty; }); }
    totalCals=Math.round(totalCals); totalP=Math.round(totalP); totalC=Math.round(totalC); totalF=Math.round(totalF);

    html += '<div class="stats-row" style="grid-template-columns:repeat(4,1fr);">';
    html += '<div class="stat-box"><div class="stat-val">'+totalCals+'</div><div class="stat-lbl">kcal</div></div>';

      html += '<div style="font-size:12px;color:var(--muted);margin-top:6px;">'+day.entries.length+' items</div></div>';

  }

  html += '</div>';

function renderWeight(){
  var html = '<div class="header"><div class="header-row"><h1>Progress</h1><button class="btn btn-primary btn-sm" onclick="openLogWeight()">+ Weight</button></div></div>';
  html += '<div class="section">';

  if(weightLog.length<2){
    html += '<div class="empty-state">Log your weight daily to see your trend chart here.</div>';
  } else {
    html += '<div class="card"><div class="section-title" style="margin-bottom:8px;">Weight Trend</div><div class="chart-wrap"><canvas id="weightChart"></canvas></div></div>';
  }

  if(weightLog.length){
    var sorted = weightLog.slice().sort(function(a,b){return a.date>b.date?1:-1;});
    var latest = sorted[sorted.length-1].weight;
    var earliest = sorted[0].weight;
    var change = (latest-earliest).toFixed(1);
    var changePos = parseFloat(change)>0;
    html += '<div class="stats-row" style="grid-template-columns:repeat(3,1fr);">';
    html += '<div class="stat-box"><div class="stat-val">'+latest+'</div><div class="stat-lbl">Current</div></div>';
    html += '<div class="stat-box"><div class="stat-val" style="color:'+(changePos?'var(--red)':'var(--green)')+'">'+change+'</div><div class="stat-lbl">Change</div></div>';
    html += '<div class="stat-box"><div class="stat-val">'+sorted.length+'</div><div class="stat-lbl">Days Logged</div></div>';
    html += '</div>';

    html += '<div class="section-title">Weight Log</div>';
    sorted.slice().reverse().forEach(function(w){
      html += '<div class="log-entry" style="padding:10px 12px;"><div class="log-header"><span class="log-name">'+fmtDate(w.date)+'</span><div class="flex gap8"><span class="log-cals">'+w.weight+' '+prefs.weightUnit+'</span><button class="btn btn-danger btn-sm btn-icon" onclick="deleteWeight(\''+w.date+'\')"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button></div></div></div>';
    });
  }

  html += '</div>';
  document.getElementById('page-weight').innerHTML = html;

  if(weightLog.length>=2){
    setTimeout(function(){ drawWeightChart(); }, 50);
  }
}
function deleteWeight(date){ if(!confirm('Remove this weight entry?')) return; weightLog=weightLog.filter(function(w){return w.date!==date;}); save(LS_WLOG_W,weightLog); renderWeight(); }

function drawWeightChart(){
  var canvas = document.getElementById('weightChart');
  if(!canvas) return;
  var sorted = weightLog.slice().sort(function(a,b){return a.date>b.date?1:-1;});
  var W = canvas.offsetWidth;
  var H = 160;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  canvas.style.width = W+'px';
  canvas.style.height = H+'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  var vals = sorted.map(function(w){return w.weight;});
  var mn = Math.min.apply(null,vals);
  var mx = Math.max.apply(null,vals);
  var pad = {t:10,r:10,b:30,l:40};
  var gW = W-pad.l-pad.r;
  var gH = H-pad.t-pad.b;
  var range = mx-mn || 1;

  function px(i){ return pad.l + (i/(sorted.length-1))*gW; }
  function py(v){ return pad.t + (1-(v-mn)/range)*gH; }

  // Grid lines
  ctx.strokeStyle='#2e2e2e'; ctx.lineWidth=1;
  for(var i=0;i<4;i++){
    var y = pad.t + (i/3)*gH;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    var lbl = (mx-(i/3)*range).toFixed(1);
    ctx.fillStyle='#666'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='right';
    ctx.fillText(lbl, pad.l-4, y+4);
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle='#e8c84a'; ctx.lineWidth=2; ctx.lineJoin='round';
  sorted.forEach(function(w,i){ i===0 ? ctx.moveTo(px(i),py(w.weight)) : ctx.lineTo(px(i),py(w.weight)); });
  ctx.stroke();

  // Dots
  sorted.forEach(function(w,i){
    ctx.beginPath();
    ctx.arc(px(i),py(w.weight),3,0,Math.PI*2);
    ctx.fillStyle='#e8c84a'; ctx.fill();
  });

  // X labels (first, last, and a couple in between)
  ctx.fillStyle='#666'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='center';
  var labelIdxs = [0, Math.floor(sorted.length/2), sorted.length-1].filter(function(v,i,a){return a.indexOf(v)===i;});
  labelIdxs.forEach(function(i){
    var d = new Date(sorted[i].date+'T12:00:00');
    ctx.fillText((d.getMonth()+1)+'/'+d.getDate(), px(i), H-4);
  });
}

  session.exercises.forEach(function(ex,ei){
    html+='<div class="card" style="margin-bottom:10px;">';
    html+='<div class="flex justify-between align-center mb8"><span class="card-title">'+escHtml(ex.name)+'</span><button class="btn btn-ghost btn-sm" onclick="addSetToEx('+ei+')">+ Set</button></div>';
    ex.sets.forEach(function(s,si){
      var doneClass=s.done?'style="border-color:var(--green);"':'';
      html+='<div class="flex gap8 align-center mb8" '+doneClass+'>';
      html+='<span style="font-size:12px;color:var(--muted);width:20px;">'+( si+1)+'</span>';
      html+='<input class="form-input" style="flex:1;" type="number" placeholder="lbs" value="'+s.weight+'" onchange="updateSet('+ei+','+si+',\'weight\',this.value)"/>';
      html+='<input class="form-input" style="flex:1;" type="number" placeholder="reps" value="'+s.reps+'" onchange="updateSet('+ei+','+si+',\'reps\',this.value)"/>';
      html+='<button class="btn '+(s.done?'btn-primary':'btn-ghost')+' btn-sm" onclick="toggleSet('+ei+','+si+')">'+(s.done?'✓':'○')+'</button>';
      html+='</div>';
    });
    html+='</div>';
  });

  html+='<button class="btn btn-ghost w-full mb8" onclick="addExToSession()">+ Add Exercise</button>';
  html+='<div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="sess-notes" placeholder="How did it feel?" value="'+escHtml(session.notes)+'"/></div>';
  html+='<div class="mt16 flex gap8"><button class="btn btn-danger w-full" onclick="cancelSession()">Discard</button><button class="btn btn-primary w-full" onclick="finishSession()">Finish Workout</button></div>';

  // Store session in temp
  window._activeSession=session;
  openModal(html);
}
function updateSet(ei,si,field,val){
  if(!window._activeSession) return;
  window._activeSession.exercises[ei].sets[si][field]=val;
}
function toggleSet(ei,si){
  if(!window._activeSession) return;
  var s=window._activeSession.exercises[ei].sets[si];
  s.done=!s.done;
  renderSessionModal(window._activeSession);
}
function addSetToEx(ei){
  if(!window._activeSession) return;
  window._activeSession.exercises[ei].sets.push({reps:'',weight:'',done:false});
  renderSessionModal(window._activeSession);
}
function addExToSession(){
  if(!window._activeSession) return;
  var name=prompt('Exercise name:');
  if(!name) return;
  window._activeSession.exercises.push({name:name,sets:[{reps:'',weight:'',done:false}]});
  renderSessionModal(window._activeSession);
}
function cancelSession(){ window._activeSession=null; closeModal(); }
function finishSession(){
  var session=window._activeSession;
  if(!session) return;
  session.notes=(document.getElementById('sess-notes')?document.getElementById('sess-notes').value:'');
  session.duration=Math.round((Date.now()-session.startTime)/60000)||1;
  // Clean: only include exercises with at least one done set
  session.exercises=session.exercises.filter(function(ex){return ex.sets.some(function(s){return s.done;});});
  if(!session.exercises.length){ alert('Mark at least one set as complete to save.'); return; }
  wlog.push(session);
  save(LS_WLOG,wlog);
  window._activeSession=null;
  closeModal();
  activeWorkoutTab='log';
  renderWorkouts();
  renderPage('today');
}

// ========================
// UTILS
// ========================
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ========================
// INIT
// ========================
renderToday();
</script>
</body>
</html>
