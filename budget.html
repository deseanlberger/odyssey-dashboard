<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-budget.png">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Making Money">
<meta name="theme-color" content="#0a0a0a">
<title>Making Money</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#fff;font-family:'Space Mono',monospace;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
input,select,textarea{-webkit-appearance:none;appearance:none}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#111;border-radius:20px 20px 0 0;padding:24px 20px calc(env(safe-area-inset-bottom) + 32px);width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}
.field input,.field select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:10px;padding:12px 14px;font-size:14px;font-family:'Space Mono',monospace;outline:none}
.field select option{background:#222}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-primary{flex:1;padding:14px;border:none;border-radius:10px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.btn-cancel{padding:14px 20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);border-radius:10px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
/* FAB */
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 20px);right:20px;z-index:100;width:58px;height:58px;border-radius:50%;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.9)}
/* SCROLL */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
/* RESPONSIVE GRID */
@media(max-width:600px){
  .two-col{grid-template-columns:1fr!important}
  .stat-row{flex-wrap:wrap}
  .stat-row > *{min-width:calc(50% - 8px)!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── CONSTANTS ────────────────────────────────────────────────
const CATEGORIES_BUSINESS = [
  {name:"Rent/Lease",icon:"🏢",color:"#FF6B35"},
  {name:"Equipment",icon:"🏋️",color:"#4ECDC4"},
  {name:"Insurance",icon:"🛡️",color:"#45B7D1"},
  {name:"Software/Subscriptions",icon:"💻",color:"#96CEB4"},
  {name:"Marketing",icon:"📢",color:"#FFEAA7"},
  {name:"Payroll/Contractors",icon:"👥",color:"#DDA0DD"},
  {name:"Supplies",icon:"📦",color:"#98D8C8"},
  {name:"Utilities",icon:"⚡",color:"#F7DC6F"},
  {name:"Education/Certs",icon:"📚",color:"#BB8FCE"},
  {name:"Vehicle/Travel",icon:"🚗",color:"#85C1E9"},
  {name:"Client Hospitality",icon:"🍽️",color:"#F1948A"},
  {name:"Professional Services",icon:"⚖️",color:"#AED6F1"},
  {name:"Loan/Debt Payments",icon:"💳",color:"#E74C3C"},
  {name:"Miscellaneous",icon:"📌",color:"#BDC3C7"},
];
const CATEGORIES_PERSONAL = [
  {name:"Housing",icon:"🏠",color:"#FF6B35"},
  {name:"Groceries",icon:"🛒",color:"#4ECDC4"},
  {name:"Dining Out",icon:"🍔",color:"#45B7D1"},
  {name:"Transportation",icon:"🚗",color:"#96CEB4"},
  {name:"Health/Fitness",icon:"💪",color:"#FFEAA7"},
  {name:"Entertainment",icon:"🎬",color:"#DDA0DD"},
  {name:"Clothing",icon:"👕",color:"#98D8C8"},
  {name:"Phone/Internet",icon:"📱",color:"#F7DC6F"},
  {name:"Subscriptions",icon:"📺",color:"#BB8FCE"},
  {name:"Personal Care",icon:"💈",color:"#85C1E9"},
  {name:"Debt Payments",icon:"💳",color:"#E74C3C"},
  {name:"Savings/Investments",icon:"🏦",color:"#2ECC71"},
  {name:"Miscellaneous",icon:"📌",color:"#BDC3C7"},
];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const formatMoney = (n) => {
  const num = Number(n)||0;
  return num < 0 ? `-$${Math.abs(num).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}` : `$${num.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
};
const getCurrentMonth = () => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`; };
const DEFAULT_STATE = { expenses:[], accounts:[], savingsGoals:{business:[],personal:[]}, debts:{business:[],personal:[]}, revenue:[] };

// ── STORAGE ──────────────────────────────────────────────────
function loadData() {
  try { const v=localStorage.getItem("titlic_v1"); return v ? JSON.parse(v) : JSON.parse(JSON.stringify(DEFAULT_STATE)); }
  catch { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}
function saveData(d) {
  try { localStorage.setItem("titlic_v1", JSON.stringify(d)); } catch(e) {}
}

// ── ADD EXPENSE MODAL ────────────────────────────────────────
function AddExpenseModal({view, accent, categories, onSave, onClose}) {
  const [form, setForm] = useState({
    vendor:"", amount:"", category: categories[0].name,
    date: new Date().toISOString().slice(0,10), notes:""
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const save = () => {
    if (!form.vendor || !form.amount) return;
    onSave({...form, amount:parseFloat(form.amount), world:view, id:"e"+Date.now()});
    onClose();
  };
  return (
    <div className="modal-bg" onClick={e=>{if(e.target.className==="modal-bg")onClose()}}>
      <div className="modal">
        <div className="modal-title" style={{color:accent}}>Log Expense</div>
        <div className="field"><label>Vendor / Description *</label>
          <input value={form.vendor} onChange={e=>set("vendor",e.target.value)} placeholder="e.g. Costco, Amazon…" autoFocus/>
        </div>
        <div className="field"><label>Amount *</label>
          <input type="number" step="0.01" value={form.amount} onChange={e=>set("amount",e.target.value)} placeholder="0.00"/>
        </div>
        <div className="field"><label>Category</label>
          <select value={form.category} onChange={e=>set("category",e.target.value)}>
            {categories.map(c=><option key={c.name}>{c.icon} {c.name}</option>)}
          </select>
        </div>
        <div className="field"><label>Date</label>
          <input type="date" value={form.date} onChange={e=>set("date",e.target.value)}/>
        </div>
        <div className="field"><label>Notes (optional)</label>
          <input value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder="Optional note…"/>
        </div>
        <div className="btn-row">
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
          <button className="btn-primary" style={{background:accent,color:"#000"}} onClick={save}>Save Expense</button>
        </div>
      </div>
    </div>
  );
}

// ── ADD REVENUE MODAL (business only) ───────────────────────
function AddRevenueModal({onSave, onClose}) {
  const [form, setForm] = useState({source:"", amount:"", date:new Date().toISOString().slice(0,10), notes:""});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const save = () => {
    if (!form.source || !form.amount) return;
    onSave({...form, amount:parseFloat(form.amount), id:"r"+Date.now()});
    onClose();
  };
  return (
    <div className="modal-bg" onClick={e=>{if(e.target.className==="modal-bg")onClose()}}>
      <div className="modal">
        <div className="modal-title" style={{color:"#2ECC71"}}>Log Revenue</div>
        <div className="field"><label>Source *</label>
          <input value={form.source} onChange={e=>set("source",e.target.value)} placeholder="e.g. Session fees, Merch…" autoFocus/>
        </div>
        <div className="field"><label>Amount *</label>
          <input type="number" step="0.01" value={form.amount} onChange={e=>set("amount",e.target.value)} placeholder="0.00"/>
        </div>
        <div className="field"><label>Date</label>
          <input type="date" value={form.date} onChange={e=>set("date",e.target.value)}/>
        </div>
        <div className="field"><label>Notes (optional)</label>
          <input value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder="Optional note…"/>
        </div>
        <div className="btn-row">
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
          <button className="btn-primary" style={{background:"#2ECC71",color:"#000"}} onClick={save}>Save Revenue</button>
        </div>
      </div>
    </div>
  );
}

// ── FAB MENU ─────────────────────────────────────────────────
function Fab({view, accent, onExpense, onRevenue}) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{position:"fixed",bottom:"calc(env(safe-area-inset-bottom) + 20px)",right:"20px",zIndex:100,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"10px"}}>
      {open && (
        <>
          {view==="business" && (
            <button onClick={()=>{setOpen(false);onRevenue()}} style={{display:"flex",alignItems:"center",gap:"10px",background:"#2ECC71",border:"none",color:"#000",borderRadius:"30px",padding:"10px 18px",fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:700,letterSpacing:"1px",cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,.4)"}}>
              + REVENUE
            </button>
          )}
          <button onClick={()=>{setOpen(false);onExpense()}} style={{display:"flex",alignItems:"center",gap:"10px",background:accent,border:"none",color:"#000",borderRadius:"30px",padding:"10px 18px",fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:700,letterSpacing:"1px",cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,.4)"}}>
            + EXPENSE
          </button>
        </>
      )}
      <button className="fab" style={{background:open?"rgba(255,255,255,.15)":accent,color:open?"#fff":"#000"}} onClick={()=>setOpen(o=>!o)}>
        {open ? "×" : "+"}
      </button>
    </div>
  );
}

// ── STAT CARD ────────────────────────────────────────────────
function StatCard({label, value, sub, accent="#FF6B35", large=false}) {
  return (
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:"12px",padding:large?"24px":"16px",flex:1,minWidth:large?"180px":"130px"}}>
      <p style={{fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"rgba(255,255,255,.4)",letterSpacing:"2px",textTransform:"uppercase",margin:0}}>{label}</p>
      <p style={{fontFamily:"'Oswald',sans-serif",fontSize:large?"32px":"22px",fontWeight:700,color:accent,margin:"6px 0 0 0",lineHeight:1}}>{value}</p>
      {sub && <p style={{fontFamily:"'Space Mono',monospace",fontSize:"10px",color:"rgba(255,255,255,.3)",margin:"4px 0 0 0"}}>{sub}</p>}
    </div>
  );
}

// ── CATEGORY BAR ─────────────────────────────────────────────
function CategoryBar({categories, expenses, month}) {
  const filtered = expenses.filter(e=>e.date&&e.date.startsWith(month));
  const total = filtered.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const byCat = categories.map(cat=>{
    const t=filtered.filter(e=>e.category&&e.category.includes(cat.name)).reduce((s,e)=>s+(Number(e.amount)||0),0);
    return {...cat,total:t,pct:total>0?(t/total)*100:0};
  }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  return (
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:"12px",padding:"20px"}}>
      <p style={{fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(255,255,255,.5)",margin:"0 0 16px 0"}}>Spending by Category</p>
      {byCat.length===0 ? <p style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",color:"rgba(255,255,255,.3)",margin:0}}>No expenses this month yet.</p> : (
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          {byCat.map(cat=>(
            <div key={cat.name}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:"11px",color:"rgba(255,255,255,.7)"}}>{cat.icon} {cat.name}</span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:600,color:cat.color}}>{formatMoney(cat.total)}</span>
              </div>
              <div style={{height:"5px",background:"rgba(255,255,255,.05)",borderRadius:"3px",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(cat.pct,100)}%`,background:`linear-gradient(90deg,${cat.color},${cat.color}88)`,borderRadius:"3px",transition:"width .5s ease"}}/>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── MONTHLY TREND ────────────────────────────────────────────
function MonthlyTrend({expenses}) {
  const year = new Date().getFullYear();
  const totals = MONTHS.map((_,i)=>{
    const k=`${year}-${String(i+1).padStart(2,"0")}`;
    return expenses.filter(e=>e.date&&e.date.startsWith(k)).reduce((s,e)=>s+(Number(e.amount)||0),0);
  });
  const max = Math.max(...totals,1);
  return (
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:"12px",padding:"20px"}}>
      <p style={{fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(255,255,255,.5)",margin:"0 0 16px 0"}}>{year} Monthly Spend</p>
      <div style={{display:"flex",alignItems:"flex-end",gap:"4px",height:"100px"}}>
        {totals.map((val,i)=>{
          const h=max>0?(val/max)*100:0;
          const cur=i===new Date().getMonth();
          return (
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",height:"100%",justifyContent:"flex-end"}}>
              {val>0&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:"7px",color:"rgba(255,255,255,.35)"}}>{val>=1000?`${(val/1000).toFixed(1)}k`:val.toFixed(0)}</span>}
              <div style={{width:"100%",height:`${Math.max(h,2)}%`,background:cur?"linear-gradient(180deg,#FF6B35,#e55a2b)":val>0?"rgba(255,255,255,.15)":"rgba(255,255,255,.04)",borderRadius:"3px 3px 0 0"}}/>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:"8px",color:cur?"#FF6B35":"rgba(255,255,255,.3)",fontWeight:cur?700:400}}>{MONTHS[i]}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── GROWTH SNAPSHOT ──────────────────────────────────────────
function GrowthSnapshot({revenue, expenses, month}) {
  const rev = revenue.filter(r=>r.date&&r.date.startsWith(month)).reduce((s,r)=>s+(Number(r.amount)||0),0);
  const exp = expenses.filter(e=>e.date&&e.date.startsWith(month)).reduce((s,e)=>s+(Number(e.amount)||0),0);
  const net = rev - exp;
  return (
    <div style={{background:"rgba(255,255,255,.03)",border:`1px solid ${net>=0?"rgba(46,204,113,.2)":"rgba(231,76,60,.2)"}`,borderRadius:"12px",padding:"20px"}}>
      <p style={{fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(255,255,255,.5)",margin:"0 0 14px 0"}}>Growth Snapshot</p>
      <div style={{display:"flex",gap:"12px",flexWrap:"wrap"}}>
        {[["REVENUE","#2ECC71",rev],["EXPENSES","#E74C3C",exp],["NET",net>=0?"#2ECC71":"#E74C3C",net]].map(([l,c,v])=>(
          <div key={l} style={{flex:1,minWidth:"90px"}}>
            <p style={{fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"rgba(255,255,255,.35)",margin:0,letterSpacing:"1px"}}>{l}</p>
            <p style={{fontFamily:"'Oswald',sans-serif",fontSize:"22px",fontWeight:700,color:c,margin:"4px 0 0 0"}}>{l==="NET"&&net>0?"+":""}{formatMoney(v)}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── DEBT TRACKER ─────────────────────────────────────────────
function DebtTracker({debts, accent}) {
  const total = debts.reduce((s,d)=>s+(Number(d.balance)||0),0);
  return (
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:"12px",padding:"20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <p style={{fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(255,255,255,.5)",margin:0}}>Debt Status</p>
        <span style={{fontFamily:"'Oswald',sans-serif",fontSize:"18px",fontWeight:700,color:total>0?"#E74C3C":"#2ECC71"}}>{formatMoney(total)}</span>
      </div>
      {debts.length===0 ? <p style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",color:"rgba(255,255,255,.3)",margin:0}}>No debts tracked yet.</p> : (
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          {debts.sort((a,b)=>(b.apr||0)-(a.apr||0)).map((d,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,.02)",borderRadius:"8px",padding:"12px",border:"1px solid rgba(255,255,255,.04)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:"11px",color:"rgba(255,255,255,.7)"}}>{d.name||"Unknown"}{d.last4?` (...${d.last4})`:""}</span>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:"15px",fontWeight:600,color:"#E74C3C"}}>{formatMoney(d.balance)}</span>
              </div>
              {(d.apr||d.minPayment) && <div style={{display:"flex",gap:"12px",marginTop:"4px"}}>
                {d.apr&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"rgba(255,255,255,.35)"}}>APR: {d.apr}%</span>}
                {d.minPayment&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"rgba(255,255,255,.35)"}}>Min: {formatMoney(d.minPayment)}</span>}
              </div>}
              {d.limit&&<div style={{marginTop:"6px",height:"4px",background:"rgba(255,255,255,.05)",borderRadius:"2px",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min((d.balance/d.limit)*100,100)}%`,background:(d.balance/d.limit)>0.7?"#E74C3C":(d.balance/d.limit)>0.4?"#F39C12":"#2ECC71",borderRadius:"2px"}}/>
              </div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── SAVINGS GOALS ────────────────────────────────────────────
function SavingsGoals({goals, accent}) {
  return (
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:"12px",padding:"20px"}}>
      <p style={{fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(255,255,255,.5)",margin:"0 0 16px 0"}}>Savings Goals</p>
      {goals.length===0 ? <p style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",color:"rgba(255,255,255,.3)",margin:0}}>No goals set yet.</p> : (
        <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
          {goals.map((g,i)=>{
            const pct=g.goal>0?Math.min((g.current/g.goal)*100,100):0;
            return (
              <div key={i}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:"11px",color:"rgba(255,255,255,.7)"}}>{g.name}</span>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:"10px",color:accent}}>{formatMoney(g.current)} / {formatMoney(g.goal)}</span>
                </div>
                <div style={{height:"7px",background:"rgba(255,255,255,.05)",borderRadius:"4px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${accent},${accent}aa)`,borderRadius:"4px",transition:"width .5s ease"}}/>
                </div>
                <p style={{fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"rgba(255,255,255,.3)",margin:"3px 0 0 0",textAlign:"right"}}>{pct.toFixed(1)}% there</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── RECENT TRANSACTIONS ──────────────────────────────────────
function RecentTransactions({expenses, onDelete}) {
  const [showAll, setShowAll] = useState(false);
  const sorted = [...expenses].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const shown = showAll ? sorted : sorted.slice(0,8);
  return (
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:"12px",padding:"20px"}}>
      <p style={{fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(255,255,255,.5)",margin:"0 0 16px 0"}}>Recent Transactions</p>
      {sorted.length===0 ? <p style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",color:"rgba(255,255,255,.3)",margin:0}}>No transactions yet. Tap + to add one.</p> : (
        <>
          <div style={{display:"flex",flexDirection:"column",gap:"2px"}}>
            {shown.map((e,i)=>(
              <div key={e.id||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 10px",borderRadius:"6px",background:i%2===0?"rgba(255,255,255,.02)":"transparent"}}>
                <div>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",color:"rgba(255,255,255,.8)"}}>{e.vendor||"Unknown"}</div>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"rgba(255,255,255,.3)",marginTop:"1px"}}>{e.date} · {e.category}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <span style={{fontFamily:"'Oswald',sans-serif",fontSize:"14px",fontWeight:600,color:"#E74C3C"}}>-{formatMoney(e.amount)}</span>
                  <button onClick={()=>onDelete(e.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,.2)",fontSize:"16px",cursor:"pointer",padding:"2px 4px"}}>×</button>
                </div>
              </div>
            ))}
          </div>
          {sorted.length>8&&<button onClick={()=>setShowAll(v=>!v)} style={{width:"100%",marginTop:"12px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",color:"rgba(255,255,255,.4)",borderRadius:"8px",padding:"8px",fontFamily:"'Oswald',sans-serif",fontSize:"12px",letterSpacing:"1px",cursor:"pointer"}}>
            {showAll?`SHOW LESS`:`SHOW ALL ${sorted.length}`}
          </button>}
        </>
      )}
    </div>
  );
}

// ── REVENUE LIST ─────────────────────────────────────────────
function RevenueList({revenue, onDelete, month}) {
  const sorted = [...revenue].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const thisMonth = sorted.filter(r=>r.date&&r.date.startsWith(month));
  return (
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(46,204,113,.12)",borderRadius:"12px",padding:"20px"}}>
      <p style={{fontFamily:"'Oswald',sans-serif",fontSize:"13px",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"rgba(255,255,255,.5)",margin:"0 0 16px 0"}}>Revenue This Month</p>
      {thisMonth.length===0 ? <p style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",color:"rgba(255,255,255,.3)",margin:0}}>No revenue logged this month. Tap + to add.</p> : (
        <div style={{display:"flex",flexDirection:"column",gap:"2px"}}>
          {thisMonth.map((r,i)=>(
            <div key={r.id||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 10px",borderRadius:"6px",background:i%2===0?"rgba(255,255,255,.02)":"transparent"}}>
              <div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",color:"rgba(255,255,255,.8)"}}>{r.source||"Revenue"}</div>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"rgba(255,255,255,.3)",marginTop:"1px"}}>{r.date}{r.notes&&` · ${r.notes}`}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontFamily:"'Oswald',sans-serif",fontSize:"14px",fontWeight:600,color:"#2ECC71"}}>+{formatMoney(r.amount)}</span>
                <button onClick={()=>onDelete(r.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,.2)",fontSize:"16px",cursor:"pointer",padding:"2px 4px"}}>×</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("business");
  const [data, setData] = useState(()=>loadData());
  const [month] = useState(getCurrentMonth);
  const [showExpModal, setShowExpModal] = useState(false);
  const [showRevModal, setShowRevModal] = useState(false);

  const accent = view==="business" ? "#FF6B35" : "#4ECDC4";
  const categories = view==="business" ? CATEGORIES_BUSINESS : CATEGORIES_PERSONAL;
  const viewExpenses = data.expenses.filter(e=>e.world===view);
  const monthExpenses = viewExpenses.filter(e=>e.date&&e.date.startsWith(month));
  const totalMonth = monthExpenses.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const viewDebts = data.debts?.[view]||[];
  const viewGoals = data.savingsGoals?.[view]||[];
  const viewRevenue = view==="business" ? (data.revenue||[]) : [];
  const monthLabel = (()=>{const [y,m]=month.split("-"); return `${MONTHS[parseInt(m)-1]} ${y}`;})();

  const update = (newData) => { setData(newData); saveData(newData); };

  const addExpense = (exp) => update({...data, expenses:[...data.expenses, exp]});
  const addRevenue = (rev) => update({...data, revenue:[...data.revenue, rev]});
  const deleteExpense = (id) => update({...data, expenses:data.expenses.filter(e=>e.id!==id)});
  const deleteRevenue = (id) => update({...data, revenue:data.revenue.filter(r=>r.id!==id)});

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0a0a0a 0%,#0f0f1a 100%)",color:"#fff",fontFamily:"'Space Mono',monospace"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0a0a0a 100%)",borderBottom:"1px solid rgba(255,107,53,.3)",padding:`calc(env(safe-area-inset-top) + 14px) 18px 14px`,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:"700px",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:"17px",fontWeight:700,letterSpacing:"3px",textTransform:"uppercase",color:"#fff",margin:0,lineHeight:1}}>THIS IS THE LIFE I CHOSE</h1>
            <p style={{fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"rgba(255,107,53,.7)",letterSpacing:"2px",textTransform:"uppercase",margin:"4px 0 0 0"}}>Financial Command Center</p>
          </div>
          <div style={{display:"flex",gap:"4px"}}>
            {["business","personal"].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{background:view===v?(v==="business"?"linear-gradient(135deg,#FF6B35,#e55a2b)":"linear-gradient(135deg,#4ECDC4,#3dbdb5)"):"rgba(255,255,255,.05)",border:view===v?"none":"1px solid rgba(255,255,255,.1)",color:view===v?"#fff":"rgba(255,255,255,.5)",padding:"8px 16px",borderRadius:"6px",cursor:"pointer",fontFamily:"'Oswald',sans-serif",fontSize:"11px",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase"}}>
                {v==="business"?"Odyssey":"Personal"}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:"700px",margin:"0 auto",padding:"20px 16px 100px"}}>
        {/* Month label */}
        <div style={{marginBottom:"20px",display:"flex",alignItems:"center",gap:"10px"}}>
          <div style={{width:"3px",height:"22px",background:accent,borderRadius:"2px"}}/>
          <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:"16px",fontWeight:600,letterSpacing:"3px",textTransform:"uppercase",color:"rgba(255,255,255,.7)",margin:0}}>
            {view==="business"?"Odyssey Performance":"Desean Berger"} / {monthLabel}
          </h2>
        </div>

        {/* Stats */}
        <div className="stat-row" style={{display:"flex",gap:"12px",flexWrap:"wrap",marginBottom:"20px"}}>
          <StatCard label="This Month" value={formatMoney(totalMonth)} sub={`${monthExpenses.length} transactions`} accent={accent} large/>
          <StatCard label="All Time" value={formatMoney(viewExpenses.reduce((s,e)=>s+(Number(e.amount)||0),0))} accent="rgba(255,255,255,.5)"/>
          <StatCard label="Total Debt" value={formatMoney(viewDebts.reduce((s,d)=>s+(Number(d.balance)||0),0))} accent={viewDebts.length>0?"#E74C3C":"#2ECC71"}/>
        </div>

        {/* Growth Snapshot — business only */}
        {view==="business" && <div style={{marginBottom:"20px"}}><GrowthSnapshot revenue={viewRevenue} expenses={viewExpenses} month={month}/></div>}

        {/* Charts */}
        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"20px"}}>
          <CategoryBar categories={categories} expenses={viewExpenses} month={month}/>
          <MonthlyTrend expenses={viewExpenses}/>
        </div>

        {/* Debt + Goals */}
        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"20px"}}>
          <DebtTracker debts={viewDebts} accent={accent}/>
          <SavingsGoals goals={viewGoals} accent={accent}/>
        </div>

        {/* Transactions + Revenue */}
        <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"20px"}}>
          <RecentTransactions expenses={viewExpenses} onDelete={deleteExpense}/>
          {view==="business"
            ? <RevenueList revenue={viewRevenue} onDelete={deleteRevenue} month={month}/>
            : <SavingsGoals goals={viewGoals} accent={accent}/>
          }
        </div>

        {/* Footer */}
        <div style={{textAlign:"center",padding:"24px 0 0",borderTop:"1px solid rgba(255,255,255,.04)"}}>
          <p style={{fontFamily:"'Oswald',sans-serif",fontSize:"10px",color:"rgba(255,255,255,.12)",letterSpacing:"3px",textTransform:"uppercase",margin:0}}>
            Odyssey Performance / Est. 2020 / Vista, CA
          </p>
        </div>
      </div>

      {/* FAB */}
      <Fab view={view} accent={accent} onExpense={()=>setShowExpModal(true)} onRevenue={()=>setShowRevModal(true)}/>

      {/* MODALS */}
      {showExpModal && <AddExpenseModal view={view} accent={accent} categories={categories} onSave={addExpense} onClose={()=>setShowExpModal(false)}/>}
      {showRevModal && <AddRevenueModal onSave={addRevenue} onClose={()=>setShowRevModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
